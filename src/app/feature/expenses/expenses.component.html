
<mat-card class="expenses-card">
  <div class="expenses-header">
    <h2>Despesas</h2>
    <button mat-raised-button color="primary" (click)="openNewExpenseDialog()">Nova Despesa</button>
  </div>
  <table mat-table [dataSource]="expenses" class="mat-elevation-z1 expenses-table">
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef> Valor </th>
      <td mat-cell *matCellDef="let e"> {{ e.amount | currency:'MT':'symbol':'1.2-2' }} </td>
    </ng-container>
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Data </th>
      <td mat-cell *matCellDef="let e"> {{ e.date | date:'shortDate' }} </td>
    </ng-container>
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Descrição </th>
      <td mat-cell *matCellDef="let e"> {{ e.description }} </td>
    </ng-container>
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef> Categoria </th>
      <td mat-cell *matCellDef="let e"> {{ e.category }} </td>
    </ng-container>
    <ng-container matColumnDef="responsible">
      <th mat-header-cell *matHeaderCellDef> Responsável </th>
      <td mat-cell *matCellDef="let e"> {{ e.responsible }} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['amount','date','description','category','responsible']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['amount','date','description','category','responsible'];"></tr>
  </table>
  <div class="expenses-pagination" *ngIf="totalPages > 1 || totalElements > size">
    <button mat-stroked-button (click)="prevPage()" [disabled]="page === 0 || loading">Anterior</button>
    <span class="pagination-info">Página {{ page + 1 }} de {{ totalPages }}</span>
    <button mat-stroked-button (click)="nextPage()" [disabled]="page >= totalPages - 1 || loading">Próxima</button>
  </div>
</mat-card>
