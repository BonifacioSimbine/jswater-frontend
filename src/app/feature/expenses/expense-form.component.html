<div class="expense-form-wrapper">
  <div class="expense-form-card">
    <h2 class="expense-form-title">Registrar Despesa</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Valor</mat-label>
        <input matInput type="number" formControlName="valor" min="0.01" step="0.01">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Descrição</mat-label>
        <input matInput formControlName="descricao">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Categoria</mat-label>
        <mat-select formControlName="categoria">
          <mat-option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Responsável</mat-label>
        <input matInput formControlName="responsavel">
      </mat-form-field>

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="!form.valid">Salvar</button>
        <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
